server:
  port: 18082

spring:
  datasource:
    url: ${RDS_URL:jdbc:mysql:localhost:3306/fca?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${RDS_USERNAME:root}
    password: ${RDS_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    # 打印 SQL 日志（开发环境用，生产环境建议关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键自增策略
      id-type: auto